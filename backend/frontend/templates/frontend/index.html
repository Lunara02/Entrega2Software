{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Tracking App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Ahora que cargamos static, podemos usarlo correctamente -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Sistema de Logística</span>
  </nav>

  <div class="container mt-4 text-center">
    <img src="https://cdn-icons-png.flaticon.com/512/46/46046.png" class="img-fluid rounded shadow" style="max-height: 200px;" alt="Camión logístico">
    <h1 class="mt-4 fw-bold">Bienvenido al sistema</h1>
    <p class="lead">Gestiona rutas, paquetes y usuarios fácilmente.</p>

    <div class="d-flex justify-content-center gap-3 mt-4">
      <button class="btn btn-primary" id="btnLogin">Iniciar sesión</button>
      <button class="btn btn-success" id="btnRegistro">Registrar usuario</button>
    </div>
  </div>

  <div id="loginForm" class="container card p-4 mt-5 shadow d-none" style="max-width: 400px;">
    <h5 class="mb-3 text-center">Iniciar sesión</h5>
    <input id="correo" class="form-control mb-2" type="text" placeholder="Correo">
    <input id="contrasena" class="form-control mb-3" type="password" placeholder="Contraseña">
    <button class="btn btn-primary w-100" id="btnEntrar">Entrar</button>
  </div>

  <div id="registroForm" class="container card p-4 mt-5 shadow d-none">
    <h5 class="mb-3">Registrar nuevo usuario</h5>
    <div class="row">
      <div class="col-md-4">
        <input id="nombreNuevo" class="form-control mb-2" placeholder="Nombre">
      </div>
      <div class="col-md-4">
        <input id="correoNuevo" class="form-control mb-2" placeholder="Correo">
      </div>
      <div class="col-md-4">
        <select id="rolNuevo" class="form-select mb-2">
          <option value="cliente">Cliente</option>
          <option value="conductor">Conductor</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <input id="claveNuevo" class="form-control mb-3" placeholder="Contraseña">
    <button class="btn btn-success" id="btnCrearUsuario">Crear usuario</button>
  </div>

  <pre id="respuesta" class="mt-4 container bg-light border rounded p-3"></pre>
  
    <!-- Carga auth.js -->
<script src="{% static 'js/auth.js' %}"></script>
    
</body>
</html>
